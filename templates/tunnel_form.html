{% extends "base.html" %}
{% block content %}
  <form class="panel form-grid" method="post" action="{{ action }}">
    <h1>{{ "编辑转发" if tunnel else "新增转发" }}</h1>

    <label>
      <span>名称</span>
      <input name="name" value="{{ form.name }}" placeholder="dpannel-linux" required>
    </label>

    <label>
      <span>外网主机</span>
      <select name="host_id" required>
        <option value="">请选择</option>
        {% for host in hosts %}
          <option value="{{ host.id }}" {% if form.host_id|string == host.id|string %}selected{% endif %}>
            {{ host.name }} - {{ host.remote_user }}@{{ host.remote_host }}:{{ host.ssh_port }}
          </option>
        {% endfor %}
      </select>
    </label>

    <label>
      <span>内网目标主机</span>
      <input name="target_host" value="{{ form.target_host }}" placeholder="10.1.1.8" required>
    </label>

    <label class="wide">
      <span>端口映射</span>
      <textarea name="port_mappings" rows="5" placeholder="3000&#10;10080&#10;2222:22" required>{{ form.port_mappings }}</textarea>
      <span class="hint">每行或逗号分隔一条；`3000` 表示外网 3000 到内网 3000，`2222:22` 表示外网 2222 到内网 22。</span>
    </label>

    <label class="check wide">
      <input type="checkbox" name="enabled" value="1" {% if form.enabled == "1" %}checked{% endif %}>
      <span>保存后自动保持运行</span>
    </label>

    <div class="form-actions wide">
      <button class="primary" type="submit">保存</button>
      <a class="button" href="{{ url_for('index') }}">返回</a>
    </div>
  </form>
{% endblock %}
